<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAR RIVER オーナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050505;min-height:100vh;display:flex;justify-content:center;padding:20px;}
.app{background:#0a0a0a;width:100%;max-width:420px;min-height:100vh;border-radius:16px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;}
.header{background:#111;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{font-size:12px;letter-spacing:3px;font-weight:500;}
.logo span{color:#ff6b2b;}
.owner-badge{background:#1f1200;border:1px solid #ff6b2b44;border-radius:6px;padding:2px 8px;font-size:10px;color:#ff6b2b;}
.screen{display:none;padding:16px 18px 16px 16px;overflow-x:hidden;}
.screen.active{display:block;}

/* メインタブ */
.main-tabs{display:flex;gap:0;background:#111;border-radius:10px;padding:3px;margin-bottom:14px;}
.main-tab{flex:1;text-align:center;padding:9px 4px;font-size:11px;color:#555;cursor:pointer;border-radius:8px;}
.main-tab.active{background:#1a1a1a;color:#fff;}

/* 売上サマリー */
.sales-card{background:#111;border:1px solid #222;border-radius:16px;padding:18px;margin-bottom:12px;}
.sales-date{font-size:11px;color:#555;margin-bottom:12px;}
.sales-total{font-size:32px;font-weight:700;color:#fff;margin-bottom:4px;}
.sales-sub{font-size:12px;color:#555;margin-bottom:16px;}
.sales-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sales-split-item{background:#1a1a1a;border-radius:10px;padding:12px;}
.sales-split-label{font-size:10px;color:#555;margin-bottom:4px;}
.sales-split-val{font-size:18px;font-weight:600;}
.sales-split-val.cash{color:#4caf50;}
.sales-split-val.card{color:#5b9cf6;}
.sales-groups{font-size:11px;color:#555;margin-top:12px;padding-top:12px;border-top:1px solid #1a1a1a;}

/* サブタブ（売上内） */
.sub-tabs{display:flex;gap:0;background:#111;border-radius:10px;padding:3px;margin-bottom:14px;}
.sub-tab{flex:1;text-align:center;padding:8px;font-size:11px;color:#555;cursor:pointer;border-radius:8px;}
.sub-tab.active{background:#1a1a1a;color:#fff;}

/* グループカード */
.gcard{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;}
.gcard.closed{border-color:#1a1a1a;opacity:0.8;}
.gcard-top{display:flex;justify-content:space-between;align-items:flex-start;}
.gcard-name{font-size:15px;font-weight:500;color:#fff;}
.gcard-price{font-size:14px;font-weight:600;color:#ff6b2b;flex-shrink:0;margin-left:8px;}
.gcard-meta{font-size:11px;color:#555;margin-top:3px;}
.pay-badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:500;margin-left:6px;vertical-align:middle;}
.pay-badge.cash{background:#1a2a1a;color:#4caf50;}
.pay-badge.card{background:#1a1f2a;color:#5b9cf6;}
.pay-badge.open{background:#1f1200;color:#ff6b2b;}
.gcard-actions{display:flex;gap:6px;margin-top:8px;}
.gcard-kaikei-btn{background:#ff6b2b22;border:1px solid #ff6b2b44;border-radius:8px;padding:5px 10px;font-size:11px;color:#ff6b2b;cursor:pointer;}

/* 詳細モーダル */
.detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;overflow-y:auto;}
.detail-modal.show{display:block;}
.detail-sheet{background:#0a0a0a;min-height:100vh;max-width:420px;margin:0 auto;padding:16px;}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.detail-back{background:transparent;border:1px solid #2a2a2a;border-radius:8px;padding:6px 12px;color:#555;font-size:11px;cursor:pointer;}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111;}
.order-item:last-child{border-bottom:none;}
.order-name{font-size:13px;color:#ccc;}
.order-meta{font-size:10px;color:#555;margin-top:2px;}
.order-price{font-size:13px;color:#fff;font-weight:500;}
.section-title{font-size:10px;letter-spacing:2px;color:#555;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #1a1a1a;}
.total-box{background:#111;border:1px solid #222;border-radius:12px;padding:14px;margin-top:12px;}
.total-row{display:flex;justify-content:space-between;font-size:12px;color:#666;padding:4px 0;}
.total-row.big{font-size:16px;font-weight:600;color:#fff;border-top:1px solid #222;margin-top:8px;padding-top:10px;}
.total-row.tax{color:#ff6b2b;}
.del-log{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.del-log-name{font-size:13px;color:#e53935;}
.del-log-meta{font-size:10px;color:#555;margin-top:3px;}
.session-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.session-date{font-size:14px;font-weight:500;color:#fff;}
.session-meta{font-size:11px;color:#555;margin-top:3px;}
.session-sales{font-size:13px;color:#ff6b2b;font-weight:500;margin-top:4px;}

/* 注文入力（スタッフ画面と共通） */
.stitle{font-size:10px;letter-spacing:2px;color:#555;margin-bottom:14px;}
.group-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.addgroup{background:#111;border:2px dashed #333;border-radius:12px;padding:16px;text-align:center;cursor:pointer;color:#444;font-size:13px;}
.modal-bg{background:#151515;border:1px solid #333;border-radius:16px;padding:16px;margin-bottom:12px;}
.field{margin-bottom:12px;}
.field label{font-size:10px;color:#555;display:block;margin-bottom:6px;letter-spacing:1px;}
.field input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;width:100%;}
.field input::placeholder{color:#333;}
.mini-staff{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.msbtn{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:6px 12px;cursor:pointer;font-size:12px;color:#888;}
.msbtn.sel{background:#1f1200;border-color:#ff6b2b;color:#ff6b2b;}
.who-sel{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.wbtn{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px 6px;text-align:center;cursor:pointer;font-size:13px;color:#888;}
.wbtn.active{background:#1f1200;border-color:#ff6b2b;color:#ff6b2b;}
.cat-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding:2px 2px 4px 2px;}
.ctab{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:5px 12px;font-size:11px;color:#666;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ctab.active{background:#ff6b2b;border-color:#ff6b2b;color:#fff;}
.mlist{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.mitem{background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.iname{font-size:13px;color:#ddd;}
.iprice{font-size:12px;color:#ff6b2b;}
.qctrl{display:flex;align-items:center;gap:6px;}
.qbtn{background:#222;border:1px solid #333;border-radius:6px;width:32px;height:32px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn.plus{background:#ff6b2b;border-color:#ff6b2b;}
.qnum{font-size:13px;color:#fff;min-width:18px;text-align:center;}
.osummary{background:#111;border:1px solid #222;border-radius:12px;padding:12px;margin-top:12px;}
.orow{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:3px 0;}
.ototal{display:flex;justify-content:space-between;font-size:14px;font-weight:500;color:#fff;border-top:1px solid #222;margin-top:8px;padding-top:8px;}
.otax{display:flex;justify-content:space-between;font-size:11px;color:#ff6b2b;padding-top:4px;}
.sendbtn{background:#ff6b2b;border:none;border-radius:12px;width:100%;padding:13px;color:#fff;font-size:14px;font-weight:500;margin-top:12px;cursor:pointer;}
.backbtn{background:transparent;border:1px solid #2a2a2a;border-radius:8px;padding:6px 12px;color:#555;font-size:11px;cursor:pointer;}
.ibar{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;margin-bottom:16px;}
.ibar span{font-size:11px;color:#555;}
.ibar strong{color:#ff6b2b;font-size:12px;}
.tag{display:inline-block;background:#1f1200;border:1px solid #ff6b2b44;border-radius:20px;padding:2px 8px;font-size:10px;color:#ff6b2b;margin:2px;}
.edit-shimei{font-size:11px;color:#ff6b2b;cursor:pointer;margin-left:8px;}

/* 会計 */
.kaikei-header{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.kaikei-gname{font-size:18px;font-weight:600;color:#fff;margin-bottom:4px;}
.kaikei-meta{font-size:11px;color:#555;}
.kaikei-section{margin-bottom:14px;}
.kaikei-section-title{font-size:10px;letter-spacing:2px;color:#555;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #1a1a1a;}
.kaikei-item{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid #1a1a1a;}
.kaikei-item:last-child{border-bottom:none;}
.kaikei-item-name{font-size:14px;color:#fff;}
.kaikei-item-detail{font-size:11px;color:#888;margin-top:3px;}
.kaikei-item-price{font-size:14px;color:#fff;font-weight:600;}
.kaikei-total-box{background:#111;border:1px solid #222;border-radius:12px;padding:14px;}
.kaikei-row{display:flex;justify-content:space-between;font-size:12px;color:#666;padding:4px 0;}
.kaikei-row.big{font-size:16px;font-weight:600;color:#fff;border-top:1px solid #222;margin-top:8px;padding-top:10px;}
.kaikei-row.tax{color:#ff6b2b;}
.close-btn{background:transparent;border:2px solid #ff6b2b;border-radius:12px;width:100%;padding:13px;color:#ff6b2b;font-size:14px;font-weight:600;margin-top:12px;cursor:pointer;}

/* 支払いモーダル */
.pay-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.pay-modal.show{display:flex;}
.pay-sheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:420px;}
.pay-title{font-size:11px;letter-spacing:2px;color:#555;text-align:center;margin-bottom:10px;}
.pay-amount{font-size:32px;font-weight:700;color:#fff;text-align:center;margin-bottom:24px;}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pay-btn{border:none;border-radius:12px;padding:18px;font-size:15px;font-weight:600;cursor:pointer;}
.pay-btn.cash{background:#252525;color:#4caf50;border:1px solid #4caf5033;}
.pay-btn.card{background:#1a1f2a;color:#5b9cf6;border:1px solid #5b9cf633;}
.pay-cancel{background:transparent;border:none;color:#444;font-size:12px;width:100%;margin-top:16px;cursor:pointer;padding:8px;}

/* スタッフ管理 */
.staff-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">BAR <span>RIVER</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="owner-badge">OWNER</div>
    <div id="o-session-badge" style="font-size:10px;color:#555;"></div>
    <button id="o-start-btn" onclick="oStartSession()" style="background:#ff6b2b;border:none;border-radius:6px;padding:4px 10px;color:#fff;font-size:10px;cursor:pointer;display:none;">営業開始</button>
    <button id="o-close-btn" onclick="oOpenCloseModal()" style="background:transparent;border:1px solid #333;border-radius:6px;padding:4px 10px;color:#555;font-size:10px;cursor:pointer;display:none;">閉店</button>
  </div>
</div>

<!-- メインタブ -->
<div style="padding:12px 16px 0;background:#0a0a0a;">
  <div class="main-tabs" id="main-tabs">
    <div class="main-tab" data-tab="order">注文入力</div>
    <div class="main-tab active" data-tab="sales">売上確認</div>
    <div class="main-tab" data-tab="staff-mgmt">スタッフ</div>
  </div>
</div>

<!-- 注文入力タブ -->
<div class="screen" id="sc-order-tab">
  <!-- グループ一覧 -->
  <div id="o-groups-view">
    <div class="stitle">お客様グループ</div>
    <div class="group-list" id="o-glist"></div>
    <div class="addgroup" id="o-addgroup-btn">＋ 新しいグループを追加</div>
    <div id="o-addgroup-form" style="display:none;margin-top:10px;">
      <div class="modal-bg">
        <div class="field"><label>お客様名</label><input type="text" id="o-gname-in" placeholder="例：新規・A様グループ" /></div>
        <div class="field"><label>人数</label><input type="number" id="o-gpax-in" placeholder="1" min="1" style="width:80px;" /></div>
        <div class="field"><label>指名スタッフ（複数可）</label><div class="mini-staff" id="o-shimei-sel"></div></div>
        <button class="sendbtn" onclick="oCreateGroup()" style="margin-top:0;">グループを作成 →</button>
      </div>
    </div>
  </div>

  <!-- 注文入力 -->
  <div id="o-order-view" style="display:none;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <button class="backbtn" onclick="oBackToGroups()">← 戻る</button>
      <div class="stitle" style="margin:0;">注文入力</div>
    </div>
    <div class="ibar">
      <span>担当 <strong>りいや</strong></span>
      <span>グループ <strong id="o-cur-group">—</strong></span>
      <span>税込 <strong id="o-cur-total">¥0</strong></span>
    </div>
    <div style="margin-bottom:10px;">
      <div style="font-size:10px;letter-spacing:1px;color:#555;margin-bottom:8px;">指名スタッフ <span class="edit-shimei" onclick="oToggleShimeiEdit()">＋ 場内指名を追加</span></div>
      <div id="o-shimei-display"></div>
      <div id="o-shimei-edit-area" style="display:none;margin-top:8px;">
        <div class="mini-staff" id="o-shimei-edit-list"></div>
        <button class="sendbtn" onclick="oSaveShimei()" style="margin-top:8px;padding:8px;">保存する</button>
      </div>
    </div>
    <div style="font-size:10px;letter-spacing:1px;color:#555;margin-bottom:6px;">誰のドリンク？</div>
    <div class="who-sel">
      <div class="wbtn active" id="o-w-guest" onclick="oSetWho('guest')">お客様</div>
      <div class="wbtn" id="o-w-self" onclick="oSetWho('self')">自分</div>
      <div class="wbtn" id="o-w-other" onclick="oSetWho('other')">他スタッフ</div>
    </div>
    <div id="o-other-staff-sel" style="display:none;margin-bottom:10px;">
      <div style="font-size:10px;color:#555;margin-bottom:8px;">スタッフを選択</div>
      <div class="mini-staff" id="o-other-staff-list"></div>
    </div>
    <div class="cat-tabs" id="o-cat-tabs"></div>
    <div class="mlist" id="o-mlist"></div>
    <div id="o-custom-input-area" style="display:none;margin-top:8px;">
      <div style="background:#151515;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;">
        <div style="font-size:10px;color:#555;margin-bottom:8px;letter-spacing:1px;">カスタム追加</div>
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <input type="text" id="o-custom-name" placeholder="品名" style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;flex:1;" />
          <input type="number" id="o-custom-price" placeholder="金額" style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;width:80px;" />
          <input type="number" id="o-custom-qty" placeholder="個数" min="1" value="1" style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;width:60px;" />
        </div>
        <button onclick="oAddCustomItem()" style="background:#ff6b2b;border:none;border-radius:8px;padding:8px;color:#fff;font-size:13px;font-weight:500;width:100%;cursor:pointer;">追加 +</button>
      </div>
    </div>
    <div class="osummary">
      <div id="o-orows" style="color:#444;font-size:12px;">まだ注文なし</div>
      <div class="ototal" id="o-ototaldiv" style="display:none;"><span>小計（税抜）</span><span id="o-ototal">¥0</span></div>
      <div class="otax" id="o-otaxdiv" style="display:none;"><span>税込合計</span><span id="o-otax">¥0</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="sendbtn" onclick="oSendOrder()" style="margin-top:0;flex:1;">注文を追加する</button>
      <button onclick="oSendAndKaikei()" style="background:#222;border:1px solid #333;border-radius:12px;padding:13px 14px;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;">会計へ →</button>
    </div>
  </div>

  <!-- 会計 -->
  <div id="o-kaikei-view" style="display:none;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="backbtn" onclick="oBackToGroups()">← 戻る</button>
      <div class="stitle" style="margin:0;">会計</div>
    </div>
    <div class="kaikei-header">
      <div class="kaikei-gname" id="o-k-gname">—</div>
      <div class="kaikei-meta" id="o-k-gmeta">—</div>
    </div>
    <div class="kaikei-section">
      <div class="kaikei-section-title">注文一覧</div>
      <div id="o-k-orders"></div>
    </div>
    <div class="kaikei-total-box">
      <div class="kaikei-row"><span>小計（税抜）</span><span id="o-k-subtotal">¥0</span></div>
      <div class="kaikei-row tax"><span>消費税 10%</span><span id="o-k-tax">¥0</span></div>
      <div class="kaikei-row big"><span>税込合計</span><span id="o-k-total">¥0</span></div>
    </div>
    <button class="close-btn" id="o-k-close-btn" onclick="oOpenPayModal()">会計を締める ✓</button>
    <div id="o-k-closed-msg" style="display:none;text-align:center;padding:14px;color:#555;font-size:12px;"></div>
  </div>
</div>

<!-- 売上確認タブ -->
<div class="screen active" id="sc-sales-tab">
  <div class="sales-card">
    <div class="sales-date" id="sales-date">—</div>
    <div class="sales-total" id="sales-total">¥0</div>
    <div class="sales-sub">税込売上合計</div>
    <div class="sales-split">
      <div class="sales-split-item"><div class="sales-split-label">💴 現金</div><div class="sales-split-val cash" id="sales-cash">¥0</div></div>
      <div class="sales-split-item"><div class="sales-split-label">💳 カード</div><div class="sales-split-val card" id="sales-card">¥0</div></div>
    </div>
    <div class="sales-groups" id="sales-groups">—</div>
  </div>
  <div class="sub-tabs" id="sub-tabs">
    <div class="sub-tab active" data-stab="today">本日</div>
    <div class="sub-tab" data-stab="back">バック</div>
    <div class="sub-tab" data-stab="history">過去の営業</div>
    <div class="sub-tab" data-stab="dellog">削除ログ</div>
  </div>
  <div id="sales-content"></div>
</div>

<!-- スタッフ管理タブ -->
<div class="screen" id="sc-staff-tab">
  <div class="stitle">スタッフ管理</div>
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px;">
    <div style="font-size:10px;color:#555;letter-spacing:1px;margin-bottom:10px;">スタッフを追加</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="new-staff-name" placeholder="名前" style="background:#111;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;flex:1;" />
      <button id="add-staff-btn" style="background:#ff6b2b;border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:13px;cursor:pointer;">追加</button>
    </div>
  </div>
  <div id="staff-list-content"></div>
</div>

</div><!-- /app -->

<!-- 閉店確認モーダル -->
<div id="o-close-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:20px;">

// バック対象定義
const DRINK_BACK_ITEMS=['テキーラ クエルボ','クライナー','コカボム','アネホ','グラス','缶']; // 杯数×100円
const PCT_BACK_ITEMS=['シャブリ','ヴーヴイエロー','ペリエ白','モエアイス','モエピカ','モエネク','ペリエロゼ','ウルトラ','ソウメイ','ベルエポ','ドンペリ白','ドンペリロゼ','アルマンドゴールド','アルマンドロゼ','観覧車 クエルボ','観覧車 アネホ','シップ クエルボ','シップ アネホ']; // 金額×10%
const CHAMPAGNE_NAMES=['シャブリ','ヴーヴイエロー','ペリエ白','モエアイス','モエピカ','モエネク','ペリエロゼ','ウルトラ','ソウメイ','ベルエポ','ドンペリ白','ドンペリロゼ','アルマンドゴールド','アルマンドロゼ']; // 指名バック計算から除外

function calcBackForSession(sessionGroups){
  const staffBack={}; // スタッフ別バック合計

  sessionGroups.forEach(g=>{
    if(!g.closed)return; // 会計済みのみ
    const isShimeiTable=g.shimei&&g.shimei.length>0;

    // ドリンクバック・シャンパンバック
    g.orders.forEach(o=>{
      if(o.who!=='self'&&o.who!=='other')return;
      const staffName=o.staff||'';
      if(!staffName)return;
      if(!staffBack[staffName])staffBack[staffName]={drink:0,pct:0,shimei:0,total:0};
      if(DRINK_BACK_ITEMS.includes(o.name)){
        // ドリンクバック：指名なし卓は全員、指名あり卓はother（他スタッフ）のみ
        if(!isShimeiTable||o.who==='other'){
          staffBack[staffName].drink+=o.qty*100;
        }
      } else if(PCT_BACK_ITEMS.includes(o.name)){
        staffBack[staffName].pct+=Math.round(o.price*o.qty*0.1); // シャンパンバック：全卓
      }
    });

    // 指名バック → 指名あり卓のみ（全注文合計・メニュー価格は税抜）
    if(isShimeiTable){
      const totalExTax=g.orders.reduce((s,o)=>s+(o.price*o.qty),0);
      const champTotal=g.orders.filter(o=>CHAMPAGNE_NAMES.includes(o.name)).reduce((s,o)=>s+(o.price*o.qty),0);
      const shimeiBase=totalExTax-champTotal;
      const shimeiBackTotal=Math.round(shimeiBase*0.1);
      const perStaff=Math.round(shimeiBackTotal/g.shimei.length);
      g.shimei.forEach(s=>{
        if(!staffBack[s])staffBack[s]={drink:0,pct:0,shimei:0,total:0};
        staffBack[s].shimei+=perStaff;
      });
    }
  });

  // 合計計算
  Object.keys(staffBack).forEach(s=>{
    staffBack[s].total=staffBack[s].drink+staffBack[s].pct+staffBack[s].shimei;
  });

  return staffBack;
}

let STAFF=[];
let groups=[],sessions=[],curSessionId=null;

let staffList=[];

function fmtDate(d){return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function fmtDateJP(d){return`${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;}
function fmtTime(d){return`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDateTime(iso){const d=new Date(iso);return`${fmtDateJP(d)} ${fmtTime(d)}`;}

/* ---- Supabase ---- */
async function sbFetch(path,method='GET',body=null){
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')headers['Prefer']='return=representation';
  const opts={method,headers};
  if(body)opts.body=JSON.stringify(body);
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
    if(!res.ok)return null;
    const text=await res.text();
    return text?JSON.parse(text):null;
  }catch(e){return null;}
}

async function loadData(){
  try{
    const cs=localStorage.getItem('river_cur_session');
    if(cs)curSessionId=cs;
  }catch(e){curSessionId=null;}
  const sData=await sbFetch('sessions?order=started_at.asc');
  if(sData)sessions=sData.map(s=>({id:s.id,startedAt:s.started_at,closedAt:s.closed_at,dateLabel:s.date_label}));
  // localStorageのセッションIDがSupabaseに存在しない場合はリセット
  if(curSessionId&&!sessions.find(s=>s.id===curSessionId)){
    curSessionId=null;
    try{localStorage.setItem('river_cur_session','');}catch(e){}
  }
  const gData=await sbFetch('groups?order=id.asc&select=*,orders(*)');
  if(gData){
    groups=gData.map(g=>({
      id:g.id,sessionId:g.session_id,name:g.name,pax:g.pax,
      shimei:g.shimei||[],closed:g.closed,closedAt:g.closed_at,
      payMethod:g.pay_method,deleteLogs:g.delete_logs||[],
      orders:(g.orders||[]).map(o=>({name:o.name,price:o.price,qty:o.qty,who:o.who,staff:o.staff,custom:o.custom,ts:o.ts}))
    }));
  }
  const staffData=await sbFetch('staff?active=eq.true&order=id.asc');
  if(staffData)STAFF=staffData.map(s=>s.name);
}

async function saveGroup(g){
  const data={session_id:g.sessionId,name:g.name,pax:g.pax,shimei:g.shimei,closed:g.closed,closed_at:g.closedAt||null,pay_method:g.payMethod||null,delete_logs:g.deleteLogs||[]};
  await sbFetch('groups?id=eq.'+g.id,'PATCH',data);
}
async function insertGroup(g){
  await sbFetch('groups','POST',{id:g.id,session_id:g.sessionId,name:g.name,pax:g.pax,shimei:g.shimei,closed:false,delete_logs:[]});
}
async function saveOrders(groupId,orders){
  await sbFetch('orders?group_id=eq.'+groupId,'DELETE');
  if(!orders.length)return;
  const rows=orders.map(o=>({group_id:groupId,name:o.name,price:o.price,qty:o.qty,who:o.who,staff:o.staff||'',custom:o.custom||false,ts:o.ts||new Date().toISOString()}));
  await sbFetch('orders','POST',rows);
}

  document.querySelectorAll('.main-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));

  document.getElementById('sc-sales-tab').classList.toggle('active',tab==='sales');

  if(tab==='sales')renderSalesTab();

/* ---- 売上タブ ---- */
function calcSales(groupList){
  const closed=groupList.filter(g=>g.closed);
  const total=closed.reduce((s,g)=>s+g.orders.reduce((a,o)=>a+(o.price*o.qty),0),0);
  const cash=closed.filter(g=>g.payMethod==='cash').reduce((s,g)=>s+g.orders.reduce((a,o)=>a+(o.price*o.qty),0),0);
  const card=closed.filter(g=>g.payMethod==='card').reduce((s,g)=>s+g.orders.reduce((a,o)=>a+(o.price*o.qty),0),0);
  return{total:Math.round(total*1.1),cash:Math.round(cash*1.1),card:Math.round(card*1.1),closedCount:closed.length,totalCount:groupList.length};
}

function renderSalesTab(){
  const sg=curSessionId?groups.filter(g=>g.sessionId===curSessionId):[];
  const session=sessions.find(s=>s.id===curSessionId);
  const sales=calcSales(sg);
  const d=session?new Date(session.startedAt):new Date();
  document.getElementById('sales-date').textContent=fmtDateJP(d)+(session&&session.closedAt?' （閉店済）':' （営業中）');
  document.getElementById('sales-total').textContent='¥'+sales.total.toLocaleString();
  document.getElementById('sales-cash').textContent='¥'+sales.cash.toLocaleString();
  document.getElementById('sales-card').textContent='¥'+sales.card.toLocaleString();
  document.getElementById('sales-groups').textContent=`${sales.totalCount}グループ　会計済 ${sales.closedCount}組`;
  renderSubTab(curSubTab);
}

function switchSubTab(tab){
  curSubTab=tab;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.stab===tab));
  renderSubTab(tab);
}

function renderSubTab(tab){
  const el=document.getElementById('sales-content');
  if(tab==='today'){
    const sg=curSessionId?groups.filter(g=>g.sessionId===curSessionId):[];
    if(!sg.length){el.innerHTML='<div style="color:#333;font-size:13px;text-align:center;padding:30px;">本日のデータなし</div>';return;}
    el.innerHTML=sg.map(g=>renderGCard(g)).join('');
  } else if(tab==='back'){
    const sg=curSessionId?groups.filter(g=>g.sessionId===curSessionId):[];
    const backData=calcBackForSession(sg);
    const entries=Object.entries(backData).sort((a,b)=>b[1].total-a[1].total);
    if(!entries.length){el.innerHTML='<div style="color:#333;font-size:13px;text-align:center;padding:30px;">バックデータなし（会計済みグループが必要です）</div>';return;}
    el.innerHTML=entries.map(([name,b])=>`
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:15px;font-weight:500;color:#fff;">${name}</div>
          <div style="font-size:17px;font-weight:700;color:#ff6b2b;">¥${b.total.toLocaleString()}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
          <div style="background:#111;border-radius:8px;padding:8px;text-align:center;">
            <div style="font-size:9px;color:#555;margin-bottom:3px;">ドリンク</div>
            <div style="font-size:13px;color:#ccc;">¥${b.drink.toLocaleString()}</div>
          </div>
          <div style="background:#111;border-radius:8px;padding:8px;text-align:center;">
            <div style="font-size:9px;color:#555;margin-bottom:3px;">シャンパン</div>
            <div style="font-size:13px;color:#ccc;">¥${b.pct.toLocaleString()}</div>
          </div>
          <div style="background:#111;border-radius:8px;padding:8px;text-align:center;">
            <div style="font-size:9px;color:#555;margin-bottom:3px;">指名</div>
            <div style="font-size:13px;color:#ccc;">¥${b.shimei.toLocaleString()}</div>
          </div>
        </div>
      </div>`).join('');
  } else if(tab==='history'){
    const past=[...sessions].filter(s=>s.id!==curSessionId).reverse();
    if(!past.length){el.innerHTML='<div style="color:#333;font-size:13px;text-align:center;padding:30px;">過去の営業データなし</div>';return;}
    el.innerHTML=past.map(s=>{
      const sg=groups.filter(g=>g.sessionId===s.id);
      const sales=calcSales(sg);
      const d=new Date(s.startedAt);
      return`<div class="session-card" data-session="${s.id}"><div class="session-date">${fmtDateJP(d)}</div><div class="session-meta">${fmtTime(d)}〜${s.closedAt?fmtTime(new Date(s.closedAt)):'—'}　${sg.length}グループ</div><div class="session-sales">¥${sales.total.toLocaleString()} <span style="font-size:10px;color:#555;">（現金¥${sales.cash.toLocaleString()} / カード¥${sales.card.toLocaleString()}）</span></div></div>`;
    }).join('');
  } else if(tab==='dellog'){
    const logs=[];
    groups.forEach(g=>{if(g.deleteLogs&&g.deleteLogs.length)g.deleteLogs.forEach(l=>logs.push({...l,groupName:g.name}));});
    logs.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
    if(!logs.length){el.innerHTML='<div style="color:#333;font-size:13px;text-align:center;padding:30px;">削除ログなし</div>';return;}
    el.innerHTML=logs.map(l=>`<div class="del-log"><div class="del-log-name">🗑 ${l.name} ×${l.qty} <span style="font-size:11px;color:#555;">[${l.label}]</span></div><div class="del-log-meta">${l.groupName}　削除者：${l.deletedBy}　${fmtDateTime(l.ts)}</div></div>`).join('');
  }
}

function renderGCard(g){
  const sub=g.orders.reduce((s,o)=>s+(o.price*o.qty),0);
  const total=Math.round(sub*1.1);
  const payLabel=g.closed?(g.payMethod==='cash'?'現金':'カード'):'未会計';
  const payClass=g.closed?(g.payMethod==='cash'?'cash':'card'):'open';
  return`<div class="gcard${g.closed?' closed':''}" data-group="${g.id}" data-detail-group="${g.id}" style="cursor:pointer;">
    <div class="gcard-top">
      <div>
        <div class="gcard-name">${g.name}<span class="pay-badge ${payClass}">${payLabel}</span></div>
        <div class="gcard-meta">${g.pax}名　指名：${g.shimei.length?g.shimei.join('・'):'なし'}</div>
        ${g.closed?`<div style="font-size:10px;color:#555;margin-top:3px;">タップで詳細・支払変更</div>`:`<div style="font-size:10px;color:#ff6b2b;margin-top:3px;">未会計</div>`}
      </div>
      <div class="gcard-price">¥${total.toLocaleString()}</div>
    </div>
  </div>`;
}

        </div>`;
      });
    }
  }

  // 削除ログ
  if(g.deleteLogs&&g.deleteLogs.length){
    html+=`<div class="section-title" style="color:#e53935;margin-top:16px;">削除ログ</div>`;
    html+=g.deleteLogs.map(l=>`<div class="del-log"><div class="del-log-name">🗑 ${l.name} ×${l.qty}</div><div class="del-log-meta">削除者：${l.deletedBy}　${fmtDateTime(l.ts)}</div></div>`).join('');
  }

  // 未会計の場合は会計ボタンを表示
  if(!g.closed){
    html+=`<button onclick="document.getElementById('detail-modal').classList.remove('show');switchMainTab('order');oOpenKaikei(${g.id});" style="background:#ff6b2b;border:none;border-radius:12px;width:100%;padding:14px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer;">会計を締める ✓</button>`;
  }

  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail-modal').classList.add('show');
}

function oChQty(name,price,delta){
  const who=oCurWho;
  const staff=who==='self'?OWNER_NAME:who==='other'?oCurOtherStaff:'';
  const ex=oCurOrders.find(o=>o.name===name&&o.who===who);
  if(ex){ex.qty+=delta;if(ex.qty<=0)oCurOrders=oCurOrders.filter(o=>!(o.name===name&&o.who===who));}
  else if(delta>0){oCurOrders.push({name,price,qty:1,who,staff});}
  const el=document.getElementById('oq-'+name.replace(/[\s（）、。]/g,'_'));
  if(el){const o=oCurOrders.find(o=>o.name===name&&o.who===who);el.textContent=o?o.qty:'';}
  oRenderSummary();
}

document.addEventListener('click', async function(e){
  // メインタブ
  const mainTab=e.target.closest('[data-tab]');
  if(mainTab&&mainTab.closest('#main-tabs'))switchMainTab(mainTab.dataset.tab);

  // サブタブ
  const subTab=e.target.closest('[data-stab]');
  if(subTab)switchSubTab(subTab.dataset.stab);

  // グループカードタップ（注文タブ）
  const gcard=e.target.closest('[data-group]');
  if(gcard&&!e.target.closest('[data-kaikei]')&&gcard.closest('#o-glist'))oOpenGroup(parseInt(gcard.dataset.group));

  // 会計ボタン
  const kaikeiBtn=e.target.closest('[data-kaikei]');
  if(kaikeiBtn)oOpenKaikei(parseInt(kaikeiBtn.dataset.kaikei));

  // 売上タブのグループカード → 詳細モーダル（sales-contentまたはdetail-content内）
  const salesGcard=e.target.closest('[data-detail-group]');
  if(salesGcard&&(salesGcard.closest('#sales-content')||salesGcard.closest('#detail-content'))){
    showGroupDetail(parseInt(salesGcard.dataset.detailGroup));
    return;
  }

  // 売上タブのセッションカード
  const sessionCard=e.target.closest('[data-session]');
  if(sessionCard)showSessionDetail(sessionCard.dataset.session);

  // スタッフ有効化/無効化
  const toggleBtn=e.target.closest('[data-toggle]');
  if(toggleBtn){
    const id=toggleBtn.dataset.toggle;
    const current=toggleBtn.dataset.active==='true';
    await sbFetch('staff?id=eq.'+id,'PATCH',{active:!current});
    renderStaffMgmt();
  }

  // 詳細モーダルを閉じる
  if(e.target.id==='detail-back-btn')document.getElementById('detail-modal').classList.remove('show');
});

async function oDeleteOrderItem(groupId, name, label){
  const g=groups.find(x=>x.id===groupId);
  if(!g)return;
  let found=false;
  for(let i=0;i<g.orders.length;i++){
    const o=g.orders[i];
    const oLabel=o.who==='guest'?'お客様':o.staff||OWNER_NAME;
    if(o.name===name&&oLabel===label){
      if(!g.deleteLogs)g.deleteLogs=[];
      g.deleteLogs.push({name,label,qty:1,price:o.price,deletedBy:OWNER_NAME,ts:new Date().toISOString()});
      o.qty-=1;
      if(o.qty<=0)g.orders.splice(i,1);
      found=true;
      break;
    }
  }
  if(!found)return;
  await saveGroup(g);
  await saveOrders(g.id,g.orders);
  oOpenKaikei(groupId);
}

function showSessionDetail(sessionId){
  const sg=groups.filter(g=>g.sessionId===sessionId);
  const session=sessions.find(s=>s.id===sessionId);
  const d=new Date(session.startedAt);
  document.getElementById('detail-title').textContent=fmtDateJP(d);
  const sales=calcSales(sg);

  // バック集計
  const closed=sg.filter(g=>g.closed);
  const backData=calcBackForSession(closed);
  let backHtml='';
  Object.entries(backData).filter(([n,b])=>b.total>0).sort((a,b)=>b[1].total-a[1].total).forEach(([name,b])=>{
    backHtml+=`<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="font-size:13px;color:#fff;">${name}</div>
        <div style="font-size:13px;color:#ff6b2b;font-weight:700;">¥${b.total.toLocaleString()}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
        <div style="background:#111;border-radius:6px;padding:5px;text-align:center;"><div style="font-size:9px;color:#555;">ドリンク</div><div style="font-size:11px;color:#ccc;">¥${b.drink.toLocaleString()}</div></div>
        <div style="background:#111;border-radius:6px;padding:5px;text-align:center;"><div style="font-size:9px;color:#555;">シャンパン</div><div style="font-size:11px;color:#ccc;">¥${b.pct.toLocaleString()}</div></div>
        <div style="background:#111;border-radius:6px;padding:5px;text-align:center;"><div style="font-size:9px;color:#555;">指名</div><div style="font-size:11px;color:#ccc;">¥${b.shimei.toLocaleString()}</div></div>
      </div>
    </div>`;
  });

  let html=`
    <div class="total-box" style="margin-bottom:14px;">
      <div class="total-row"><span>💴 現金</span><span>¥${sales.cash.toLocaleString()}</span></div>
      <div class="total-row"><span>💳 カード</span><span>¥${sales.card.toLocaleString()}</span></div>
      <div class="total-row big"><span>売上合計（税込）</span><span>¥${sales.total.toLocaleString()}</span></div>
    </div>
    ${backHtml?`<div style="font-size:10px;color:#555;letter-spacing:1px;margin-bottom:8px;">バック明細</div>${backHtml}`:''}
    <div style="font-size:10px;color:#555;letter-spacing:1px;margin:14px 0 8px;">伝票一覧</div>
  `;
  html+=sg.map(g=>renderGCard(g)).join('');
  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail-modal').classList.add('show');
}

/* ---- 営業開始・閉店 ---- */
async function oStartSession(){
  const now=new Date();
  curSessionId='session_'+now.getTime();
  const session={id:curSessionId,startedAt:now.toISOString(),closedAt:null,dateLabel:fmtDate(now)};
  sessions.push(session);
  localStorage.setItem('river_cur_session',curSessionId);
  await sbFetch('sessions','POST',{id:session.id,started_at:session.startedAt,closed_at:null,date_label:session.dateLabel});
  document.getElementById('o-session-badge').textContent=fmtDateJP(now);
  document.getElementById('o-start-btn').style.display='none';
  document.getElementById('o-close-btn').style.display='block';
  renderOGroups();
}

function oOpenCloseModal(){
  const sg=curSessionId?groups.filter(g=>g.sessionId===curSessionId):[];
  const unclosed=sg.filter(g=>!g.closed);
  const sales=calcSales(sg);
  document.getElementById('o-close-modal-stats').innerHTML=`
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;padding:3px 0;"><span>グループ数</span><span>${sg.length}組</span></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;padding:3px 0;"><span>未会計</span><span style="color:${unclosed.length>0?'#ff6b2b':'#888'}">${unclosed.length}組</span></div>
    <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:600;color:#fff;border-top:1px solid #222;margin-top:6px;padding-top:8px;"><span>売上合計（税込）</span><span>¥${sales.total.toLocaleString()}</span></div>
  `;
  document.getElementById('o-close-modal').style.display='flex';
}

async function oConfirmClose(){
  document.getElementById('o-close-modal').style.display='none';
  const now=new Date();
  const session=sessions.find(s=>s.id===curSessionId);
  if(session){
    session.closedAt=now.toISOString();
    await sbFetch('sessions?id=eq.'+curSessionId,'PATCH',{closed_at:now.toISOString()});
  }
  localStorage.setItem('river_cur_session','');
  curSessionId=null;
  document.getElementById('o-session-badge').textContent='';
  document.getElementById('o-start-btn').style.display='block';
  document.getElementById('o-close-btn').style.display='none';
  renderOGroups();
}

/* ---- Init ---- */
async function init(){
  document.getElementById('o-glist').innerHTML='<div style="color:#555;font-size:13px;text-align:center;padding:20px;">読み込み中...</div>';
  await loadData();
  // セッションバッジと営業ボタン
  if(curSessionId){
    const session=sessions.find(s=>s.id===curSessionId);
    if(session&&!session.closedAt){
      const d=new Date(session.startedAt);
      document.getElementById('o-session-badge').textContent=fmtDateJP(d);
      document.getElementById('o-close-btn').style.display='block';
    } else {
      curSessionId=null;
      localStorage.setItem('river_cur_session','');
      document.getElementById('o-start-btn').style.display='block';
    }
  } else {
    document.getElementById('o-start-btn').style.display='block';
  }
  renderOGroups();
  renderSalesTab(); // 起動時に売上確認を表示
  // 30秒ごとに自動更新
  setInterval(async()=>{await loadData();renderOGroups();},30000);
}
init();
</script>
